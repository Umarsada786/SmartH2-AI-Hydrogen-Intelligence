version: '3.8'

services:
  tensorflow:
    image: tensorflow/tensorflow:latest
    ports:
      - "8501:8501"
      - "8888:8888"
    volumes:
      - ./tensorflow:/app

  fastapi:
    image: tiangolo/uvicorn-gunicorn-fastapi:python3.8
    ports:
      - "8000:80"
    volumes:
      - ./fastapi:/app

  postgresql:
    image: postgres:latest
    environment:
      POSTGRES_DB: smart_h2
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  timescaledb:
    image: timescaledev/timescaledb:latest-pg12
    environment:
      POSTGRES_DB: smart_h2
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"

  kafka:
    image: wurstmeister/kafka:latest
    ports:
      - "9092:9092"
    expose:
      - "2181"
    environment:
      KAFKA_ADVERTIZED_LISTENERS: INSIDE://kafka:9092,OUTSIDE://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_LISTENERS: INSIDE://0.0.0.0:9092,OUTSIDE://0.0.0.0:9092
      ZOOKEEPER_IP: zookeeper

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  react:
    build:
      context: ./react
    ports:
      - "3000:3000"
    volumes:
      - ./react:/app

networks:
  default:
    driver: bridge